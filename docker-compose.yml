# =============================================================
#  PROJET DPE — Séance 1
#  Stack : Kafka (KRaft) + MinIO (Data Lake)
#  Architecture : Open Data -> Kafka -> MinIO/bronze
# =============================================================

networks:
  dpe-network:
    driver: bridge

volumes:
  minio-data:

# =============================================================
services:

  # -----------------------------------------------------------
  # 1. KAFKA (mode KRaft — sans Zookeeper)
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    platform: linux/amd64
    container_name: kafka
    hostname: kafka
    networks:
      - dpe-network
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "dpe-projet-cluster-001"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------
  # 2. KAFKA UI
  # -----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: linux/amd64
    container_name: kafka-ui
    networks:
      - dpe-network
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "dpe-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"

  # -----------------------------------------------------------
  # 3. MINIO — Data Lake
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    platform: linux/amd64
    container_name: minio
    hostname: minio
    networks:
      - dpe-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 4. MINIO INIT — création bucket datalake
  # -----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    platform: linux/amd64
    container_name: minio-init
    networks:
      - dpe-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/datalake;
      echo 'Bucket datalake créé avec succès';
      "