version: '3.8'

# =============================================================
#  PROJET DPE — Séance 2
#  Stack : Kafka (KRaft) + MinIO + Spark
#  Architecture : Bronze -> Spark -> Silver
# =============================================================

networks:
  dpe-network:
    driver: bridge

volumes:
  minio-data:               # Persistance des données MinIO

# =============================================================
services:

  # -----------------------------------------------------------
  # 1. KAFKA (mode KRaft — sans Zookeeper)
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    hostname: kafka
    networks:
      - dpe-network
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "dpe-projet-cluster-001"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------
  # 2. KAFKA UI
  #    Accès : http://localhost:8090
  # -----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - dpe-network
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "dpe-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"

  # -----------------------------------------------------------
  # 3. MINIO — Data Lake
  #    Console web : http://localhost:9001
  #    API S3      : http://localhost:9000
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    networks:
      - dpe-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 4. APP — Conteneur Python (Kafka producers/consumers)
  # -----------------------------------------------------------
  app:
    build: .
    container_name: app
    networks:
      - dpe-network
    volumes:
      - ./pipelines:/app/pipelines
      - ./datalake:/datalake
    environment:
      KAFKA_BROKER: "kafka:9092"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_USER: "admin"
      MINIO_PASSWORD: "admin123"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # -----------------------------------------------------------
  # 5. MINIO INIT — Crée le bucket "datalake"
  # -----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - dpe-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/datalake;
      echo '✅ Bucket datalake créé avec succès';
      "

  # -----------------------------------------------------------
  # 6. SPARK MASTER — Chef d orchestre Spark
  #    Spark UI : http://localhost:8081
  # -----------------------------------------------------------
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-master
    hostname: spark-master
    networks:
      - dpe-network
    ports:
      - "8081:8080"         # Spark Master UI
      - "7077:7077"         # Port de communication interne Spark
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./pipelines:/app/pipelines
    depends_on:
      minio:
        condition: service_healthy

  # -----------------------------------------------------------
  # 7. SPARK WORKER — Executant des taches Spark
  # -----------------------------------------------------------
  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-worker
    hostname: spark-worker
    networks:
      - dpe-network
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_CORES: "2"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./pipelines:/app/pipelines
    depends_on:
      - spark-master

  # -----------------------------------------------------------
  # 8. STREAMLIT — Dashboard de visualisation
  #    Accès : http://localhost:8501
  # -----------------------------------------------------------
  streamlit:
    build: .
    container_name: streamlit
    hostname: streamlit
    networks:
      - dpe-network
    ports:
      - "8501:8501"
    environment:
      MINIO_ENDPOINT: "minio:9000"
      MINIO_USER: "admin"
      MINIO_PASSWORD: "admin123"
    volumes:
      - ./pipelines:/app/pipelines
    command: streamlit run /app/pipelines/analyse/dashboard.py
             --server.port=8501
             --server.address=0.0.0.0
             --server.headless=true
    depends_on:
      minio:
        condition: service_healthy