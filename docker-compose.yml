version: '3.8'

# =============================================================
#  PROJET DPE — Séance 1
#  Stack : Kafka (KRaft) + MinIO (Data Lake)
#  Architecture : Open Data -> Kafka -> MinIO/bronze
# =============================================================

networks:
  dpe-network:
    driver: bridge

volumes:
  minio-data:               # Persistance des données MinIO

# =============================================================
services:

  # -----------------------------------------------------------
  # 1. KAFKA (mode KRaft — sans Zookeeper)
  # -----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    hostname: kafka
    networks:
      - dpe-network
    ports:
      - "9092:9092"         # Pour les producers/consumers dans les conteneurs
      - "9094:9094"         # Pour les connexions depuis ta machine locale
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: "dpe-projet-cluster-001"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # On crée les topics manuellement
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------
  # 2. KAFKA UI — Visualiser les topics et messages
  #    Accès : http://localhost:8090
  # -----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks:
      - dpe-network
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: "dpe-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"

  # -----------------------------------------------------------
  # 3. MINIO — Data Lake (stockage objet compatible S3)
  #    Console web : http://localhost:9001
  #    API S3      : http://localhost:9000
  # -----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    networks:
      - dpe-network
    ports:
      - "9000:9000"         # API S3 (utilisée par le consumer Python)
      - "9001:9001"         # Console web MinIO
    environment:
      MINIO_ROOT_USER: admin          # Login console MinIO
      MINIO_ROOT_PASSWORD: admin123   # Mot de passe (min 8 caractères)
    volumes:
      - minio-data:/data              # Persistance des fichiers
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # 4. APP — Conteneur Python pour producer et consumer
  #    Tout le monde utilise Python 3.11.9, peu importe la machine
  #    Usage :
  #      docker-compose run --rm app python pipelines/kafka/producer.py --limite 100
  #      docker-compose run --rm app python pipelines/kafka/consumer.py
  # -----------------------------------------------------------
  app:
    build: .                              # Construit depuis le Dockerfile
    container_name: app
    networks:
      - dpe-network
    volumes:
      - ./pipelines:/app/pipelines        # Monte tout le dossier pipelines/
      - ./datalake:/datalake              # Monte le dossier datalake
    environment:
      # Dans Docker, on communique via les noms des conteneurs (pas localhost)
      KAFKA_BROKER: "kafka:9092"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_USER: "admin"
      MINIO_PASSWORD: "admin123"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # -----------------------------------------------------------
  # 5. MINIO INIT — Crée automatiquement le bucket "datalake"
  #    Ce conteneur s'exécute une fois puis s'arrête
  # -----------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - dpe-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin admin123;
      mc mb --ignore-existing local/datalake;
      echo '✅ Bucket datalake créé avec succès';
      "